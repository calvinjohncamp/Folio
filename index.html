<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Folio">
<meta name="theme-color" content="#1a1814">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folio</title>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=Space+Grotesk:wght@300;400;500;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style6.css?v=102"><script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
</head>
<body>
<input type="file" id="fileInput" accept=".folio,.txt,.docx,.doc,application/octet-stream,*/*" style="display:none" onchange="loadFile(this)">
<div id="hdr">
  <div class="logo">Folio<em>.</em></div>
  <input id="dtitle" type="text" placeholder="Dateiname" spellcheck="false">
  <!-- Mode toggle: centered in header -->
  <div class="mode-btns" id="modebtnswrap">
    <button class="mode-btn" id="endlessbtn" onclick="setA4Mode(false)" title="Endlos schreiben">∞</button>
    <button class="mode-btn" id="a4btn" onclick="setA4Mode(true)" title="A4-Vorschau">A4</button>
  </div>
  <div class="hbtns">
    <button class="hbtn" onclick="openFile()">Öffnen</button>
    <button class="hbtn" onclick="openSaveAs()">Speichern unter</button>
    <button class="hbtn p" onclick="doPDF()">PDF</button>
  </div>
</div>
<div id="tb">
  <select id="fnt" class="sel" style="width:130px" onchange="setFont(this.value)">
    <option value="'Helvetica Neue',Helvetica,Arial,sans-serif" selected>Helvetica Neue</option>
    <option value="'Lora',Georgia,serif">Lora</option>
    <option value="'DM Serif Display',serif">DM Serif</option>
    <option value="'Playfair Display',serif">Playfair</option>
    <option value="'Libre Baskerville',serif">Baskerville</option>
    <option value="'DM Sans',sans-serif">DM Sans</option>
    <option value="'Space Grotesk',sans-serif">Space Grotesk</option>
  </select>
  <select id="fsz" class="sel" style="width:52px;margin-left:4px" onchange="setSize(this.value)">
    <option>10</option><option>12</option><option>13</option><option selected>14</option><option>18</option><option>24</option>
  </select>
  <select id="flh" class="sel" style="width:90px;margin-left:4px" onchange="setLineH(this.value)">
    <option value="1.25" selected>1,25-zeilig</option>
    <option value="1.5">1,5-zeilig</option>
    <option value="1.75">1,75-zeilig</option>
    <option value="2">2-zeilig</option>
  </select>
  <div class="sep"></div>
  <button class="tbtn" id="bb" onclick="fmt('bold')"><b>B</b></button>
  <button class="tbtn" id="bi" onclick="fmt('italic')"><i>I</i></button>
  <button class="tbtn" id="bu" onclick="fmt('underline')"><u>U</u></button>
  <div class="sep"></div>
  <button class="tbtn" onclick="aln('left')"><svg viewBox="0 0 16 16"><line x1="1" y1="4" x2="15" y2="4"/><line x1="1" y1="8" x2="10" y2="8"/><line x1="1" y1="12" x2="15" y2="12"/></svg></button>
  <button class="tbtn" onclick="aln('center')"><svg viewBox="0 0 16 16"><line x1="2" y1="4" x2="14" y2="4"/><line x1="4" y1="8" x2="12" y2="8"/><line x1="2" y1="12" x2="14" y2="12"/></svg></button>
  <button class="tbtn" onclick="aln('right')"><svg viewBox="0 0 16 16"><line x1="1" y1="4" x2="15" y2="4"/><line x1="6" y1="8" x2="15" y2="8"/><line x1="1" y1="12" x2="15" y2="12"/></svg></button>
  <div class="sep"></div>
  <button class="tbtn" onclick="lst('ul')"><svg viewBox="0 0 16 16"><circle cx="2.5" cy="5" r="1.5" fill="currentColor" stroke="none"/><line x1="6" y1="5" x2="15" y2="5"/><circle cx="2.5" cy="11" r="1.5" fill="currentColor" stroke="none"/><line x1="6" y1="11" x2="15" y2="11"/></svg></button>
  <button class="tbtn" onclick="lst('ol')"><svg viewBox="0 0 16 16"><text x="1" y="7" font-size="5.5" fill="currentColor" stroke="none">1.</text><line x1="7" y1="5" x2="15" y2="5"/><text x="1" y="13" font-size="5.5" fill="currentColor" stroke="none">2.</text><line x1="7" y1="11" x2="15" y2="11"/></svg></button>
  <div class="sep"></div>
  <button class="tbtn" onclick="showTM()" style="font-size:11px;padding:0 7px;min-width:auto">+ Tabelle</button>
  <div class="sep"></div>
  <button class="tbtn" title="Gesamten Text kopieren" onclick="copyAll()" style="font-size:11px;padding:0 8px;min-width:auto">Alles kopieren</button>
  <button class="tbtn" title="Markierten Text kopieren" onclick="copySelection()" style="font-size:11px;padding:0 8px;min-width:auto">Kopieren</button>
  <button class="tbtn" title="Aus Zwischenablage einfügen" onclick="pasteClipboard()" style="font-size:11px;padding:0 8px;min-width:auto">Einfügen</button>
  <button class="tbtn" title="Rückgängig" onclick="document.execCommand('undo')">↩</button>
  <div class="sep"></div>
  <button class="tbtn" title="Alles markieren" onclick="selectAll()" style="font-weight:900;font-size:13px">M</button>
  <div class="sep"></div>
  <button class="tbtn" title="Alles löschen" onclick="clearAll()"><svg width="12" height="14" viewBox="0 0 12 14" fill="none" xmlns="http://www.w3.org/2000/svg">
  <line x1="1" y1="2" x2="11" y2="2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="4" y1="0.5" x2="8" y2="0.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="2" y1="3" x2="3" y2="13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="10" y1="3" x2="9" y2="13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="3" y1="13" x2="9" y2="13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="5" y1="4" x2="4.5" y2="12" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <line x1="7" y1="4" x2="7.5" y2="12" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
</svg></button>
</div>
<div id="main">
  <div id="side"></div>
  <div id="cv"><div id="pages"></div></div>
</div>
<div id="sb">
  <span>Wörter: <span class="sv" id="wc">0</span></span>
  <span>Zeichen: <span class="sv" id="cc">0</span></span>
  <span>Seiten: <span class="sv" id="pgc">—</span></span>
  <span id="saved">Folio 1.0</span>
</div>
<div id="ruler"></div>

<!-- Table modal -->
<div class="mo" id="tm">
  <div class="md"><h3>Tabelle einfügen</h3>
    <div class="mrow"><label>Zeilen</label><input type="number" id="tr2" value="3" min="1" max="20"></div>
    <div class="mrow"><label>Spalten</label><input type="number" id="tc2" value="3" min="1" max="10"></div>
    <div class="mbtns"><button onclick="cmo('tm')">Abbrechen</button><button class="p" onclick="insT()">Einfügen</button></div>
  </div>
</div>

<!-- Save As modal -->
<div class="mo" id="sam">
  <div class="md"><h3>Speichern unter</h3>
    <div class="mrow"><label>Dateiname</label><input type="text" id="saname"></div>
    <div class="fmtg">
      <div class="fmto sf" id="ff" onclick="sf('folio')"><span>📄</span><b>.folio</b><small>Folio-Format</small></div>
      <div class="fmto" id="fh" onclick="sf('html')"><span>🌐</span><b>.html</b><small>Browser</small></div>
      <div class="fmto" id="ft" onclick="sf('txt')"><span>📝</span><b>.txt</b><small>Reiner Text</small></div>
      <div class="fmto" id="fp" onclick="sf('pdf')"><span>📕</span><b>PDF</b><small>Druckfertig</small></div>
    </div>
    <div class="mbtns"><button onclick="cmo('sam')">Abbrechen</button><button class="p" onclick="doSaveAs()">Herunterladen</button></div>
  </div>
</div>

<!-- Rename modal -->
<div id="rename-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center">
  <div style="background:#faf9f6;border-radius:12px;padding:24px;width:80%;max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,.3)">
    <div style="font-family:'DM Sans',sans-serif;font-size:13px;color:#8a8478;margin-bottom:8px">Dokumentname</div>
    <input id="rename-input" type="text" spellcheck="false"
      style="width:100%;box-sizing:border-box;border:1px solid #e0dbd0;border-radius:6px;padding:10px 12px;font-size:15px;font-family:'DM Sans',sans-serif;color:#1a1814;outline:none;margin-bottom:16px">
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button onclick="closeRename()" style="background:transparent;border:1px solid #e0dbd0;border-radius:6px;padding:8px 16px;font-size:13px;cursor:pointer;color:#8a8478">Abbrechen</button>
      <button onclick="confirmRename()" style="background:#c8441a;border:none;border-radius:6px;padding:8px 16px;font-size:13px;cursor:pointer;color:#fff;font-weight:bold">OK</button>
    </div>
  </div>
</div>

<!-- Clear modal -->
<div id="clear-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center">
  <div style="background:#faf9f6;border-radius:12px;padding:24px;width:80%;max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.3)">
    <div style="font-family:'DM Sans',sans-serif;font-size:14px;color:#1a1814;margin-bottom:16px">Gesamten Inhalt löschen?</div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button onclick="clearAllCancel()" style="background:transparent;border:1px solid #e0dbd0;border-radius:6px;padding:8px 16px;font-size:13px;cursor:pointer;color:#8a8478">Abbrechen</button>
      <button onclick="clearAllConfirm()" style="background:#c8441a;border:none;border-radius:6px;padding:8px 16px;font-size:13px;cursor:pointer;color:#fff;font-weight:bold">Löschen</button>
    </div>
  </div>
</div>

<script src="app7.js?v=102"></script>
</body>
</html>
